spring.application.name=testmate-ai
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.testmate.phase=phase-2
app.testmate.dashboard.enabled=true
app.testmate.api-key=${TESTMATE_API_KEY:}
app.testmate.cors.allowed-origins=${TESTMATE_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.testmate.execution.core-pool-size=${TESTMATE_EXECUTION_CORE_POOL_SIZE:1}
app.testmate.execution.max-pool-size=${TESTMATE_EXECUTION_MAX_POOL_SIZE:2}
app.testmate.execution.queue-capacity=${TESTMATE_EXECUTION_QUEUE_CAPACITY:10}

# Local default database. For Supabase/Postgres, set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, and SPRING_DATASOURCE_PASSWORD.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testmate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT_MS:30000}

# Example Supabase settings:
# SPRING_DATASOURCE_URL=jdbc:postgresql://<project-ref>.supabase.co:5432/postgres?sslmode=require
# SPRING_DATASOURCE_USERNAME=postgres
# SPRING_DATASOURCE_PASSWORD=<password>
# SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
