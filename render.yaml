services:
  - type: web
    name: testmate-ai-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/framework/health
    envVars:
      - key: PORT
        value: 8080
      - key: TESTMATE_API_KEY
        sync: false
      - key: TESTMATE_ALLOWED_ORIGINS
        sync: false
      - key: TESTMATE_EXECUTION_CORE_POOL_SIZE
        value: 1
      - key: TESTMATE_EXECUTION_MAX_POOL_SIZE
        value: 2
      - key: TESTMATE_EXECUTION_QUEUE_CAPACITY
        value: 5
      - key: WEB_EXECUTION_MODE
        value: local
      - key: WEB_BROWSER
        value: chromium
      - key: WEB_HEADLESS
        value: true
      - key: WEB_REMOTE_WS_ENDPOINT
        sync: false
      - key: WEB_REMOTE_CDP_ENDPOINT
        sync: false
      - key: WEB_REMOTE_CONNECT_TIMEOUT_MS
        value: 30000
      - key: WEB_REMOTE_HEADERS
        sync: false
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_DATASOURCE_MAX_POOL_SIZE
        value: 5
      - key: SPRING_DATASOURCE_MIN_IDLE
        value: 1
