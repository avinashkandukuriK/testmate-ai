name: TestMate AI Tests

# GitHub Actions is intentionally paused for now.
# Current behavior: manual execution only.
# To re-enable automatic CI later, uncomment the push and pull_request triggers below.

on:
  workflow_dispatch:

# Re-enable later when framework dependencies are stable:
# on:
#   push:
#     branches: [ main ]
#   pull_request:
#     branches: [ main ]
#   workflow_dispatch:

jobs:
  ai-validation-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run AI validation tests
        run: mvn clean test -Dai.provider=mock

      - name: Upload Cucumber report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-report.html

      - name: Upload TestMate AI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testmate-ai-reports
          path: target/testmate-ai-reports
